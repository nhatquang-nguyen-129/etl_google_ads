name: 'pipeline_google_ads'
version: '1.0.0'
config-version: 2

profile: 'pipeline_google_ads'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pipeline_google_ads:

    raw:
      +materialized: view

    stg:
      +materialized: ephemeral

    int:
      +materialized: ephemeral

    mart:
      +materialized: table
      +schema: "{{ var('company') }}_dataset_google_api_mart"