name: 'pipeline_google_ads'
version: '1.0.0'
config-version: 2

profile: 'pipeline_google_ads'

vars:
  company: "{{ env_var('COMPANY') }}"
  department: "{{ env_var('DEPARTMENT') }}"
  account: "{{ env_var('ACCOUNT') }}"

models:
  pipeline_google_ads:

    raw:
      +materialized: view

    stg:
      +materialized: ephemeral

    int:
      +materialized: ephemeral

    mart:
      +materialized: table
      +schema: "{{ var('company') }}_dataset_google_api_mart"